apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kvstore-hpa
  namespace: kvstore
  labels:
    app: kvstore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kvstore

  minReplicas: 1
  maxReplicas: 10

  metrics:
    # Scale on CPU utilisation relative to the pod's CPU *request* (100m)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50   # scale up when pods average >50% of their CPU request

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react quickly to load spikes
      policies:
        - type: Pods
          value: 3                     # add at most 3 pods per scaling event
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60   # wait 60s before removing pods (avoids thrashing)
      policies:
        - type: Pods
          value: 2                     # remove at most 2 pods per scaling event
          periodSeconds: 60
