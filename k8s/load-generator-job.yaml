apiVersion: batch/v1
kind: Job
metadata:
  name: load-generator
  namespace: kvstore
  labels:
    app: load-generator
spec:
  # Will not restart on failure — just re-apply to re-run
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      restartPolicy: Never
      containers:
        - name: load-generator
          # Same Python slim image — no extra deps needed (stdlib only)
          image: python:3.11-slim
          command:
            - python
            - /load_gen.py
          env:
            - name: TARGET_URL
              value: "http://kvstore.kvstore.svc.cluster.local:5000"
            - name: RPS
              value: "50"       # 50 requests/sec — enough to saturate 1-2 pods
            - name: DURATION
              value: "120"      # Run for 2 minutes then finish
          volumeMounts:
            - name: script
              mountPath: /load_gen.py
              subPath: load_gen.py
          resources:
            requests:
              cpu: "200m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
      volumes:
        - name: script
          configMap:
            name: load-generator-script

# NOTE: The load-generator-script ConfigMap is NOT defined here.
# It is created by scripts/run-load-test.sh from load-generator/load_gen.py.
# Run:  bash scripts/run-load-test.sh

